<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Controle de validade de produtos">
    <title>Validade Control</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para converter JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google GenAI SDK (ES Module Shim para funcionar no browser) -->
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.run/@google/genai",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0"
  }
}
</script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f9fafb; }
        /* Animações suaves */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Ajuste para input de data no iOS */
        input[type="date"] { appearance: none; -webkit-appearance: none; min-height: 42px; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { GoogleGenAI } from "@google/genai";

        const { useState, useEffect, useMemo } = React;

        // --- ÍCONES (SVG direto para não depender de lib externa) ---
        const Icons = {
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            CalendarClock: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><path d="M22 16a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z"/></svg>,
            ChefHat: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" x2="18" y1="17" y2="17"/></svg>,
            Sparkles: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 3v4"/><path d="M3 5h4"/><path d="M3 9h4"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
            AlertOctagon: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Package: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22v-9"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Loader2: ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        };

        // --- UTILS ---
        const getDaysUntilExpiration = (expirationDate) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const exp = new Date(expirationDate);
            // Ajuste simples de timezone: considera a data de entrada como UTC meio-dia para evitar problemas de fuso
            const expDate = new Date(exp.getUTCFullYear(), exp.getUTCMonth(), exp.getUTCDate());
            
            const diffTime = expDate.getTime() - today.getTime();
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const getExpirationStatus = (expirationDate) => {
            const days = getDaysUntilExpiration(expirationDate);
            if (days < 0) return 'EXPIRED';
            if (days <= 29) return 'WARNING'; // Alerta de 29 dias solicitado
            return 'GOOD';
        };

        const formatDate = (dateString) => {
            if (!dateString) return '-';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        };

        // --- SERVICE GEMINI ---
        const getGeminiSuggestion = async (product, apiKey) => {
            if (!apiKey) return "⚠️ Configure sua API Key no botão de engrenagem para usar a IA.";
            
            try {
                const ai = new GoogleGenAI({ apiKey });
                const prompt = `
                    O produto "${product.name}" (${product.category}, ${product.quantity} ${product.unit}) vence em ${formatDate(product.expirationDate)}.
                    Sugira 3 ideias curtas e criativas (receitas ou usos) para evitar desperdício.
                    Se venceu, diga se é seguro usar.
                    Responda em texto simples e direto em Português.
                `;

                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: prompt,
                });

                return response.text;
            } catch (error) {
                console.error(error);
                return "Erro ao consultar IA. Verifique sua chave API.";
            }
        };

        // --- COMPONENTS ---

        const DashboardStats = ({ products }) => {
            const stats = products.reduce((acc, p) => {
                const status = getExpirationStatus(p.expirationDate);
                acc.total++;
                if (status === 'EXPIRED') acc.expired++;
                if (status === 'WARNING') acc.warning++;
                if (status === 'GOOD') acc.good++;
                return acc;
            }, { total: 0, expired: 0, warning: 0, good: 0 });

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-blue-100 flex flex-col items-center text-center">
                        <div className="text-blue-600 mb-1"><Icons.Package /></div>
                        <span className="text-2xl font-bold text-gray-800">{stats.total}</span>
                        <span className="text-xs text-gray-500 uppercase font-semibold">Total</span>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-red-100 flex flex-col items-center text-center">
                        <div className="text-red-600 mb-1"><Icons.AlertOctagon /></div>
                        <span className="text-2xl font-bold text-gray-800">{stats.expired}</span>
                        <span className="text-xs text-gray-500 uppercase font-semibold">Vencidos</span>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-amber-100 flex flex-col items-center text-center">
                        <div className="text-amber-600 mb-1"><Icons.AlertTriangle /></div>
                        <span className="text-2xl font-bold text-gray-800">{stats.warning}</span>
                        <span className="text-xs text-gray-500 uppercase font-semibold">Alertas</span>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-green-100 flex flex-col items-center text-center">
                        <div className="text-green-600 mb-1"><Icons.CheckCircle /></div>
                        <span className="text-2xl font-bold text-gray-800">{stats.good}</span>
                        <span className="text-xs text-gray-500 uppercase font-semibold">Bons</span>
                    </div>
                </div>
            );
        };

        const ProductForm = ({ onAdd, onClose }) => {
            const [form, setForm] = useState({ name: '', category: '', expirationDate: '', quantity: '1', unit: 'un' });

            const handleSubmit = (e) => {
                e.preventDefault();
                onAdd(form);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 fade-in">
                    <div className="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden animate-slideUp">
                        <div className="flex justify-between items-center p-5 border-b border-gray-100">
                            <h2 className="text-lg font-bold text-gray-800">Novo Produto</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.X /></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-5 space-y-4">
                            <div>
                                <label className="block text-xs font-semibold text-gray-600 mb-1 uppercase">Nome</label>
                                <input required className="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" 
                                    value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Ex: Queijo Mussarela" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1 uppercase">Categoria</label>
                                    <select className="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none"
                                        value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                        <option value="">Outros</option>
                                        <option value="Laticínios">Laticínios</option>
                                        <option value="Carnes">Carnes</option>
                                        <option value="Grãos">Grãos</option>
                                        <option value="Bebidas">Bebidas</option>
                                        <option value="Limpeza">Limpeza</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1 uppercase">Validade</label>
                                    <input required type="date" className="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none"
                                        value={form.expirationDate} onChange={e => setForm({...form, expirationDate: e.target.value})} />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1 uppercase">Qtd</label>
                                    <input required type="number" step="0.1" className="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none"
                                        value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1 uppercase">Unidade</label>
                                    <select className="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none"
                                        value={form.unit} onChange={e => setForm({...form, unit: e.target.value})}>
                                        <option value="un">un</option>
                                        <option value="kg">kg</option>
                                        <option value="g">g</option>
                                        <option value="l">l</option>
                                        <option value="ml">ml</option>
                                        <option value="cx">caixa</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                                <Icons.Plus /> Adicionar
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ apiKey, setApiKey, onClose }) => {
            const [key, setKey] = useState(apiKey);
            
            const handleSave = () => {
                setApiKey(key);
                onClose();
            };

            return (
                 <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-bold text-gray-800">Configurações</h2>
                            <button onClick={onClose}><Icons.X /></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-3">Insira sua chave da Gemini API para ativar as sugestões inteligentes.</p>
                        <input 
                            type="password" 
                            className="w-full p-3 border border-gray-300 rounded-lg mb-4 text-sm" 
                            placeholder="Cole sua API Key aqui..." 
                            value={key}
                            onChange={(e) => setKey(e.target.value)}
                        />
                        <button onClick={handleSave} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl">Salvar Configuração</button>
                         <p className="text-xs text-center text-gray-400 mt-3">A chave fica salva apenas no seu navegador.</p>
                    </div>
                </div>
            )
        }

        const App = () => {
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('products');
                return saved ? JSON.parse(saved) : [];
            });
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [showForm, setShowForm] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [loadingId, setLoadingId] = useState(null);
            const [suggestion, setSuggestion] = useState(null);

            useEffect(() => localStorage.setItem('products', JSON.stringify(products)), [products]);
            useEffect(() => localStorage.setItem('gemini_api_key', apiKey), [apiKey]);

            const addProduct = (p) => setProducts([...products, { ...p, id: crypto.randomUUID() }]);
            const removeProduct = (id) => {
                if(confirm("Remover este item?")) setProducts(products.filter(p => p.id !== id));
            };

            const handleSuggestion = async (p) => {
                setLoadingId(p.id);
                setSuggestion(null);
                const text = await getGeminiSuggestion(p, apiKey);
                setSuggestion({ id: p.id, text });
                setLoadingId(null);
            };

            // Ordenar: vencimento mais próximo primeiro
            const sortedProducts = [...products].sort((a, b) => new Date(a.expirationDate) - new Date(b.expirationDate));

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-white sticky top-0 z-20 border-b border-gray-200 px-5 h-16 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-2 text-blue-600">
                            <Icons.CalendarClock />
                            <h1 className="text-xl font-extrabold tracking-tight text-slate-800">Validade<span className="text-blue-600">Control</span></h1>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="p-2 text-gray-400 hover:text-gray-700 bg-gray-50 rounded-full">
                            <Icons.Settings />
                        </button>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 sm:p-6">
                        <DashboardStats products={products} />

                        <div className="flex justify-between items-end mb-4">
                            <h2 className="text-lg font-bold text-gray-800">Seus Itens</h2>
                            <span className="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-1 rounded-full">{products.length} itens</span>
                        </div>

                        {products.length === 0 ? (
                            <div className="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-gray-200">
                                <div className="mx-auto w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 mb-3"><Icons.Package /></div>
                                <p className="text-gray-500 font-medium">Nenhum produto cadastrado.</p>
                                <p className="text-sm text-gray-400">Toque em "+" para começar.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {sortedProducts.map(p => {
                                    const days = getDaysUntilExpiration(p.expirationDate);
                                    const status = getExpirationStatus(p.expirationDate);
                                    
                                    // Cores baseadas no status
                                    const colors = {
                                        EXPIRED: 'bg-red-50 border-red-100 text-red-700',
                                        WARNING: 'bg-amber-50 border-amber-100 text-amber-700',
                                        GOOD: 'bg-white border-gray-100 text-slate-600'
                                    }[status];

                                    const badgeText = {
                                        EXPIRED: `Venceu há ${Math.abs(days)} dias`,
                                        WARNING: `Vence em ${days} dias`,
                                        GOOD: `Vence em ${days} dias`
                                    }[status];

                                    return (
                                        <div key={p.id} className={`rounded-xl border shadow-sm transition-all overflow-hidden ${status === 'GOOD' ? 'bg-white' : colors.split(' ')[0] + ' ' + colors.split(' ')[1]}`}>
                                            <div className="p-4 flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <h3 className="font-bold text-slate-800">{p.name}</h3>
                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide border ${status === 'GOOD' ? 'bg-green-100 text-green-700 border-green-200' : colors}`}>
                                                            {badgeText}
                                                        </span>
                                                    </div>
                                                    <p className="text-sm text-slate-500">
                                                        {p.category} • {p.quantity} {p.unit} • {formatDate(p.expirationDate)}
                                                    </p>
                                                </div>
                                                
                                                <div className="flex items-center gap-2 mt-2 sm:mt-0 pt-2 sm:pt-0 border-t sm:border-t-0 border-black/5">
                                                    {(status === 'WARNING' || status === 'EXPIRED') && (
                                                        <button 
                                                            onClick={() => handleSuggestion(p)}
                                                            className="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors"
                                                        >
                                                            {loadingId === p.id ? <Icons.Loader2 className="animate-spin" /> : <Icons.ChefHat />}
                                                            Dicas IA
                                                        </button>
                                                    )}
                                                    <button onClick={() => removeProduct(p.id)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                                        <Icons.Trash2 />
                                                    </button>
                                                </div>
                                            </div>

                                            {/* AI Response Area */}
                                            {suggestion?.id === p.id && (
                                                <div className="bg-indigo-50/80 p-4 border-t border-indigo-100 animate-slideDown">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <h4 className="text-xs font-bold text-indigo-800 uppercase flex items-center gap-1"><Icons.Sparkles /> Sugestão Inteligente</h4>
                                                        <button onClick={() => setSuggestion(null)} className="text-indigo-400 hover:text-indigo-600"><Icons.X /></button>
                                                    </div>
                                                    <p className="text-sm text-indigo-900 leading-relaxed whitespace-pre-line">{suggestion.text}</p>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Floating Action Button (Mobile Style) */}
                    <button 
                        onClick={() => setShowForm(true)}
                        className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg shadow-blue-600/30 flex items-center justify-center transition-transform hover:scale-105 active:scale-90"
                    >
                        <Icons.Plus />
                    </button>

                    {showForm && <ProductForm onAdd={addProduct} onClose={() => setShowForm(false)} />}
                    {showSettings && <SettingsModal apiKey={apiKey} setApiKey={setApiKey} onClose={() => setShowSettings(false)} />}
                </div>
            );
        };
